version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    # Snowflake password injected from host environment
    SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
    # dbt project path inside the container
    DBT_PROJECT_DIR: /opt/airflow/dbt_project
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    # Mount dbt project so Airflow can run dbt commands
    - ../src/etl/dbt_project:/opt/airflow/dbt_project
    # Mount dbt profiles — required for Snowflake connection
    - ~/.dbt:/home/airflow/.dbt:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Creates log subdirectories that Airflow's processor handler requires at import time.
  # Without this, every Airflow service fails with:
  #   ValueError: Unable to configure handler 'processor'
  airflow-mkdir:
    image: busybox
    volumes:
      - ./logs:/opt/airflow/logs
    command: sh -c "mkdir -p /opt/airflow/logs/dag_processor_manager /opt/airflow/logs/scheduler && chown -R 50000:0 /opt/airflow/logs"
    restart: "no"

  airflow-init:
    <<: *airflow-common
    command: >-
      bash -c "
        pip install dbt-snowflake==1.11.1 &&
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com
      "
    restart: "no"
    depends_on:
      airflow-mkdir:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
