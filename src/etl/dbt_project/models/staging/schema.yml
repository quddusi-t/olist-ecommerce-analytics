version: 2

models:
  - name: stg_orders
    description: Cleaned orders with delivery metrics and status flags.
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: order_status
        tests: [not_null]
      - name: order_date
        tests: [not_null]

  - name: stg_order_items
    description: Order line items with price and freight.
    columns:
      - name: order_id
        tests: [not_null]
      - name: order_item_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: seller_id
        tests: [not_null]
      - name: price
        tests: [not_null]

  - name: stg_order_payments
    description: Payments aggregated to order level (total value, primary type, max installments).
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: total_payment_value
        tests: [not_null]

  - name: stg_order_reviews
    description: Customer reviews with sentiment flags.
    columns:
      - name: review_id
        tests: [not_null, unique]
      - name: order_id
        tests: [not_null]
      - name: review_score
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]

  - name: stg_customers
    description: Customers with city/state. customer_unique_id is the real person; customer_id is a per-order alias.
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: customer_unique_id
        tests: [not_null]

  - name: stg_sellers
    description: Seller location data.
    columns:
      - name: seller_id
        tests: [not_null, unique]

  - name: stg_products
    description: Products with English category names (fallback to Portuguese for 2 untranslated categories).
    columns:
      - name: product_id
        tests: [not_null, unique]
      - name: category
        tests: [not_null]

  - name: stg_geolocation
    description: One representative lat/lng point per zip code, averaged across all raw entries.
    columns:
      - name: zip_code
        tests: [not_null]
